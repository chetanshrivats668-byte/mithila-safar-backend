<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Yatri Point – Cab E-Ticket</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);margin:0;padding:24px;display:flex;justify-content:center}.ticket{max-width:650px;width:100%;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,40,.25)}.head{background:#0f172a;color:#fff;padding:22px;display:flex;justify-content:space-between}.badge{background:#10b981;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700}.body{padding:20px;display:grid;gap:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.cell{background:#f8faff;border:1px solid #e8f0fe;border-radius:10px;padding:10px}.k{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase}.v{font-size:16px;font-weight:800;color:#0f172a}.actions{display:flex;gap:10px;justify-content:center;margin:16px 0}.btn{padding:10px 16px;border:none;border-radius:999px;cursor:pointer;font-weight:700}@media(max-width:600px){.row{grid-template-columns:1fr}}@media print{.actions{display:none}}</style></head><body><div style="width:100%"><div class="actions"><button class="btn" onclick="window.print()">🖨️ Print</button><button class="btn" onclick="location.href='index.html'">🏠 Home</button></div><div class="ticket"><div class="head"><div><h2 style="margin:0">🚕 Cab Booking Ticket</h2><div id="bookingId">YPC-XXXX</div></div><div class="badge">CONFIRMED</div></div><div class="body"><div class="row"><div class="cell"><div class="k">Pickup</div><div class="v" id="pickup">—</div></div><div class="cell"><div class="k">Drop</div><div class="v" id="drop">—</div></div></div><div class="row"><div class="cell"><div class="k">Date</div><div class="v" id="date">—</div></div><div class="cell"><div class="k">Time</div><div class="v" id="time">—</div></div></div><div class="row"><div class="cell"><div class="k">Cab Type</div><div class="v" id="cabType">—</div></div><div class="cell"><div class="k">Passengers</div><div class="v" id="passengers">1</div></div></div><div class="row"><div class="cell"><div class="k">Rider</div><div class="v" id="name">—</div></div><div class="cell"><div class="k">Phone</div><div class="v" id="phone">—</div></div></div><div class="row"><div class="cell"><div class="k">Payment</div><div class="v" id="method">—</div></div><div class="cell"><div class="k">Amount</div><div class="v" id="amount">₹—</div></div></div></div></div></div><script>(function(){var raw=localStorage.getItem('latestTicket')||localStorage.getItem('latestCabTicket');if(!raw)return;var d=JSON.parse(raw);var fmt=function(x){if(!x)return'—';try{return new Date(x).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return x}};document.getElementById('bookingId').textContent=d.orderId||('YPC-'+Date.now().toString(36).toUpperCase());document.getElementById('pickup').textContent=d.pickup||d.from||d.source||'—';document.getElementById('drop').textContent=d.drop||d.to||d.destination||'—';document.getElementById('date').textContent=fmt(d.date||d.travelDate);document.getElementById('time').textContent=d.time||d.pickupTime||'—';document.getElementById('cabType').textContent=d.cabType||(d.selectedCab&&d.selectedCab.type)||'Sedan';document.getElementById('passengers').textContent=d.passengers||d.guests||1;document.getElementById('name').textContent=d.userName||d.riderName||'Primary Rider';document.getElementById('phone').textContent=d.userPhone||d.phone||'—';document.getElementById('method').textContent=(d.paymentMethod||'Razorpay').toUpperCase();document.getElementById('amount').textContent='₹'+(d.amount||d.payNow||'—');})();</script></body></html>
